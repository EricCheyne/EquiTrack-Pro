version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: equitrack-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-equitrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-equitrack_dev_password}
      POSTGRES_DB: ${DB_NAME:-equitrack}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-equitrack}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - equitrack-network

  redis:
    image: redis:7-alpine
    container_name: equitrack-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - equitrack-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  equitrack-network:
    driver: bridge
