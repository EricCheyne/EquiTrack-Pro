# Docker Compose for Integration Testing
# Alternative to Testcontainers - useful for CI/CD environments
# Usage: docker-compose -f docker-compose.test.yml up --abort-on-container-exit

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: equitrack-api-test-postgres
    environment:
      POSTGRES_DB: equitrack_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5433:5432" # Use different port from development
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testuser -d equitrack_test" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  api-test:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile.test
    container_name: equitrack-api-test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://testuser:testpass@postgres:5432/equitrack_test
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: equitrack_test
      DATABASE_USER: testuser
      DATABASE_PASSWORD: testpass
      NODE_ENV: test
      API_PORT: 3001
      API_HOST: 0.0.0.0
    command: npm run test:integration
    volumes:
      - ../../services/api:/app/services/api
      - /app/services/api/node_modules

volumes:
  postgres-test-data:
